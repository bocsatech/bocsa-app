<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>LEAN PRODUCTION — Laxenburg 2026</title>
  <style>
    @page { size: A4 landscape; margin: 0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #e5e7eb;
      display: flex;
      justify-content: center;
      padding: 24px;
    }
    .cover {
      width: 297mm;
      height: 210mm;
      background: #f5f6fa;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
      overflow: hidden;
    }
    .hero {
      flex: 1;
      display: grid;
      grid-template-columns: 52mm 1fr;
      min-height: 0;
      position: relative;
    }
    .sidebar {
      background: linear-gradient(180deg, #ff7a1a 0%, #e85d04 52%, #dc4f03 100%);
      color: #fff;
      padding: 16mm 10mm;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 4px 0 24px rgba(234, 88, 12, 0.22);
    }
    .sidebarHeader {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebarMark {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: #fff;
      color: #ea580c;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 1.05rem;
      box-shadow: 0 2px 10px rgba(0,0,0,.12);
      flex-shrink: 0;
    }
    .sidebarTitle {
      font-size: 1.02rem;
      font-weight: 700;
      line-height: 1.15;
    }
    .sidebarSubtitle {
      font-size: 0.76rem;
      opacity: 0.88;
      font-weight: 500;
      margin-top: 3px;
    }
    .sidebarNav a {
      display: block;
      padding: 8px 10px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.78rem;
      color: rgba(255,255,255,.96);
    }
    .sidebarNav a.active {
      background: #fff;
      color: #ea580c;
    }
    .main {
      padding: 10mm 12mm 8mm;
      display: flex;
      flex-direction: column;
      gap: 8mm;
      min-width: 0;
      overflow: hidden;
    }
    .homeLead {
      font-size: 0.85rem;
      color: #6b7280;
      font-weight: 500;
    }
    .homeGrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      opacity: 0.55;
    }
    .homeCard {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      min-height: 72px;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 8px 24px rgba(15,23,42,.06);
      font-size: 0.62rem;
      font-weight: 700;
      color: #111827;
      text-align: center;
    }
    .homeCardIcon {
      width: 36px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #fed7aa, #fb923c);
    }
    .pdcaWrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    .pdcaWrap svg {
      width: 100%;
      max-width: 220mm;
      height: auto;
    }
    .footer {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: end;
      padding: 10mm 18mm 12mm;
      background: #fff;
      border-top: 1px solid #e5e7eb;
    }
    .titleBlock h1 {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: .02em;
      color: #111;
      line-height: 1.05;
    }
    .titleBlock p {
      margin-top: 6px;
      font-size: 17px;
      color: #9ca3af;
      font-weight: 500;
    }
    .authorBlock {
      text-align: right;
      font-size: 20px;
      font-weight: 600;
      color: #111;
    }
    @media print {
      body { background: #fff; padding: 0; }
      .cover { box-shadow: none; width: 100vw; height: 100vh; }
    }
  </style>
</head>
<body>
  <article class="cover">
    <section class="hero">
      <aside class="sidebar" aria-label="Navigation">
        <div class="sidebarHeader">
          <div class="sidebarMark">B</div>
          <div>
            <div class="sidebarTitle">Bocsa</div>
            <div class="sidebarSubtitle">Betrieb</div>
          </div>
        </div>
        <nav class="sidebarNav" aria-hidden="true">
          <a class="active" href="#">Home</a>
          <a href="#">Baumaschinen</a>
          <a href="#">Arbeitsauftrag</a>
          <a href="#">Lager</a>
          <a href="#">PKW</a>
        </nav>
      </aside>
      <div class="main">
        <p class="homeLead">Schnellzugriff — Menüs</p>
        <div class="homeGrid" aria-hidden="true">
          <div class="homeCard"><div class="homeCardIcon"></div>Kleingerät</div>
          <div class="homeCard"><div class="homeCardIcon"></div>Elektrogerät</div>
          <div class="homeCard"><div class="homeCardIcon"></div>Baumaschinen</div>
          <div class="homeCard"><div class="homeCardIcon"></div>Bauarbeitsauftrag</div>
          <div class="homeCard"><div class="homeCardIcon"></div>Bauprüfprotokoll</div>
          <div class="homeCard"><div class="homeCardIcon"></div>PKW</div>
          <div class="homeCard"><div class="homeCardIcon"></div>Lager</div>
          <div class="homeCard"><div class="homeCardIcon"></div>QR-Code</div>
        </div>
        <div class="pdcaWrap" aria-label="PDCA-Zyklus">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 200" role="img" aria-label="PDCA: Planung, Umsetzung, Überprüfung, Verbesserung">
            <defs>
              <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
              </filter>
            </defs>
            <!-- PLAN -->
            <g transform="translate(20,20)" filter="url(#shadow)">
              <circle cx="70" cy="70" r="68" fill="#38bdf8"/>
              <circle cx="70" cy="70" r="52" fill="#0ea5e9"/>
              <g transform="translate(70,70)" fill="#fff">
                <path d="M-18-22h36v44h-36z" opacity=".95"/>
                <path d="M-12-16h24v4h-24zm0 10h18v4h-18zm0 10h22v4h-22z" fill="#0ea5e9"/>
                <circle cx="0" cy="0" r="28" fill="none" stroke="#fff" stroke-width="6" stroke-dasharray="8 6" opacity=".35"/>
              </g>
              <text x="70" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#111">PLAN</text>
              <text x="70" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#374151">Planung</text>
            </g>
            <path d="M168 90h72" stroke="#111" stroke-width="3" marker-end="url(#arrow)"/>
            <!-- DO -->
            <g transform="translate(260,20)" filter="url(#shadow)">
              <circle cx="70" cy="70" r="68" fill="#4ade80"/>
              <circle cx="70" cy="70" r="52" fill="#22c55e"/>
              <g transform="translate(70,70)" fill="#fff">
                <path d="M-8 8l-12 12 4 4 12-12z"/>
                <path d="M8-12l16 16-8 8-16-16z" fill="#fff"/>
                <rect x="-4" y="-18" width="8" height="28" rx="2" transform="rotate(-45)"/>
              </g>
              <text x="70" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#111">DO</text>
              <text x="70" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#374151">Umsetzung</text>
            </g>
            <path d="M408 90h72" stroke="#111" stroke-width="3" marker-end="url(#arrow)"/>
            <!-- CHECK -->
            <g transform="translate(500,20)" filter="url(#shadow)">
              <circle cx="70" cy="70" r="68" fill="#fbbf24"/>
              <circle cx="70" cy="70" r="52" fill="#f59e0b"/>
              <g transform="translate(70,70)" fill="none" stroke="#fff" stroke-width="5">
                <circle cx="-2" cy="-2" r="16"/>
                <path d="M8 8l14 14" stroke-linecap="round"/>
              </g>
              <text x="70" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#111">CHECK</text>
              <text x="70" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#374151">Überprüfung</text>
            </g>
            <path d="M648 90h72" stroke="#111" stroke-width="3" marker-end="url(#arrow)"/>
            <!-- ACT -->
            <g transform="translate(740,20)" filter="url(#shadow)">
              <circle cx="70" cy="70" r="68" fill="#f87171"/>
              <circle cx="70" cy="70" r="52" fill="#ef4444"/>
              <g transform="translate(70,70)" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round">
                <path d="M0-18a18 18 0 1 1 0 36"/>
                <path d="M0-18v-8M0 18v8M-18 0h-8M18 0h8"/>
                <path d="M8-14l6-6M-8 14l-6 6M8 14l6 6M-8-14l-6-6"/>
              </g>
              <text x="70" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#111">ACT</text>
              <text x="70" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#374151">Verbesserung</text>
            </g>
            <defs>
              <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
                <path d="M0,0 L10,5 L0,10 Z" fill="#111"/>
              </marker>
            </defs>
          </svg>
        </div>
      </div>
    </section>
    <footer class="footer">
      <div class="titleBlock">
        <h1>LEAN PRODUCTION</h1>
        <p>Laxenburg 2026</p>
      </div>
      <div class="authorBlock">Bocsa Robert</div>
    </footer>
  </article>
</body>
</html>
