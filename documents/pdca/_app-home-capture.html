<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Bocsa App — Home capture</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background: #f5f6fa;
      width: 1440px;
      height: 900px;
      overflow: hidden;
    }
    .shell {
      display: grid;
      grid-template-columns: 196px 1fr;
      height: 100%;
    }
    .sidebar {
      background: linear-gradient(180deg, #ff7a1a 0%, #e85d04 52%, #dc4f03 100%);
      color: #fff;
      padding: 20px 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 4px 0 24px rgba(234, 88, 12, 0.22);
    }
    .sidebarHeader {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 6px 8px;
    }
    .sidebarMark {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: #fff;
      color: #ea580c;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 1.05rem;
    }
    .sidebarTitle { font-size: 1.02rem; font-weight: 700; line-height: 1.15; }
    .sidebarSubtitle { margin-top: 3px; font-size: 0.76rem; opacity: 0.88; }
    .nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .nav a {
      display: block;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 0.92rem;
      font-weight: 600;
      color: rgba(255,255,255,.92);
    }
    .nav a.active {
      background: rgba(255,255,255,.96);
      color: #ea580c;
    }
    .navBottom {
      border-top: 1px solid rgba(255,255,255,.18);
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .main {
      padding: 28px 36px;
      overflow: hidden;
    }
    .lead {
      margin-bottom: 1.25rem;
      font-size: 0.95rem;
      color: #6b7280;
      font-weight: 500;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 20px;
      max-width: 1100px;
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 188px;
      padding: 18px 14px 14px;
      border-radius: 24px;
      background: #fff;
      border: 1px solid #e5e7eb;
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.07);
    }
    .card span {
      font-weight: 700;
      font-size: 0.88rem;
      text-align: center;
      line-height: 1.25;
      color: #111827;
    }
    .card img, .card svg {
      width: 140px;
      max-height: 110px;
      object-fit: contain;
    }
    .card.photo img {
      width: 100%;
      max-width: 160px;
      max-height: 120px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="sidebarHeader">
        <div class="sidebarMark">B</div>
        <div>
          <div class="sidebarTitle">Bocsa</div>
          <div class="sidebarSubtitle">Betrieb</div>
        </div>
      </div>
      <nav class="nav">
        <a class="active" href="#">Home</a>
        <a href="#">Meine Menü</a>
        <a href="#">Baumaschinen</a>
        <a href="#">PKW</a>
        <a href="#">Lager</a>
        <a href="#">Meldungen</a>
        <a href="#">Arbeitsstunden</a>
        <a href="#">Filialen</a>
        <a href="#">QR-Code</a>
      </nav>
      <div class="navBottom">
        <a href="#">Benutzer</a>
        <a href="#">Gruppen</a>
      </div>
    </aside>
    <main class="main">
      <p class="lead">Schnellzugriff — Menüs</p>
      <div class="grid" id="grid"></div>
    </main>
  </div>
  <script>
    const cards = [
      ["Kleingerät", "kleingeraet", true],
      ["Elektrogerät", "elektrogeraet", true],
      ["Baumaschinen", "grossgeraet", true],
      ["Bauarbeitsauftrag", "arbeitsauftrag", false],
      ["Bauprüfprotokoll", "pruefprotokoll", true],
      ["PKW", "pkw", true],
      ["PKW-Service", "pkw-service", true],
      ["Kunden", "kunden", false],
      ["Lager", "lager", false],
      ["Ersatzteile", "ersatzteile", true],
      ["Meldungen", "meldungen", false],
      ["Lager-Meldungen", "lager-meldungen", false],
      ["Bewegungen", "bewegungen", false],
      ["Inventur", "inventur", false],
      ["Filialen", "filialen", false],
      ["QR-Code", "qr", false],
    ];
    const grid = document.getElementById("grid");
    for (const [label, icon, photo] of cards) {
      const el = document.createElement("div");
      el.className = "card" + (photo ? " photo" : "");
      el.innerHTML =
        `<span>${label}</span>` +
        `<img src="../../public/icons/home/${icon}.png" alt="" />`;
      grid.appendChild(el);
    }
  </script>
</body>
</html>
