<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>PDCA-Zyklus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1200px;
      height: 900px;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: #edf4f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 48px;
      overflow: hidden;
      position: relative;
    }
    .waves {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 200px;
      height: 160px;
      opacity: 0.5;
    }
    .dots {
      position: absolute;
      right: 40px;
      top: 110px;
      width: 120px;
      height: 260px;
      opacity: 0.4;
      background-image: radial-gradient(#8aa8c4 1.1px, transparent 1.1px);
      background-size: 13px 13px;
    }
    .header { text-align: center; margin-bottom: 38px; z-index: 1; }
    .header h1 {
      font-size: 46px;
      font-weight: 800;
      color: #1a4d7a;
    }
    .header p {
      margin-top: 8px;
      font-size: 19px;
      color: #2a5f8f;
      font-weight: 500;
    }
    .grid-wrap {
      position: relative;
      width: 680px;
      height: 680px;
      z-index: 1;
    }
    .quad {
      position: absolute;
      width: 340px;
      height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #fff;
    }
    .quad.plan { background: #2f9fd6; top: 0; left: 0; border-radius: 26px 0 0 0; }
    .quad.do { background: #3cb878; top: 0; right: 0; border-radius: 0 26px 0 0; }
    .quad.check { background: #f5a623; bottom: 0; right: 0; border-radius: 0 0 26px 0; }
    .quad.act { background: #e85656; bottom: 0; left: 0; border-radius: 0 0 0 26px; }
    .icon-ring {
      width: 90px;
      height: 90px;
      background: #fff;
      border-radius: 50%;
      display: grid;
      place-items: center;
    }
    .icon-ring svg { width: 48px; height: 48px; }
    .quad h2 { font-size: 38px; font-weight: 800; letter-spacing: 0.05em; }
    .quad p {
      font-size: 17px;
      font-weight: 600;
      text-align: center;
      max-width: 270px;
      line-height: 1.3;
    }
    .center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 186px;
      height: 186px;
      background: #fff;
      border-radius: 50%;
      z-index: 2;
      display: grid;
      place-items: center;
    }
    .center svg { width: 124px; height: 124px; }
  </style>
</head>
<body>
  <svg class="waves" viewBox="0 0 200 160" fill="none">
    <path d="M0 120 Q35 95 70 112 T140 105 T200 118" stroke="#8ab4d4" stroke-width="2"/>
    <path d="M0 136 Q45 112 90 128 T180 120" stroke="#8ab4d4" stroke-width="2"/>
    <path d="M0 150 Q55 132 110 145 T200 142" stroke="#8ab4d4" stroke-width="2"/>
  </svg>
  <div class="dots" aria-hidden="true"></div>

  <header class="header">
    <h1>PDCA-Zyklus</h1>
    <p>Planen – Umsetzen – Prüfen – Handeln</p>
  </header>

  <div class="grid-wrap">
    <div class="quad plan">
      <div class="icon-ring">
        <svg viewBox="0 0 48 48" fill="none"><rect x="10" y="8" width="20" height="26" rx="2" stroke="#2f9fd6" stroke-width="2.2"/><circle cx="33" cy="33" r="9" stroke="#2f9fd6" stroke-width="2.2"/><circle cx="33" cy="33" r="3.5" fill="#2f9fd6"/><path d="M38 28l4-4" stroke="#2f9fd6" stroke-width="2.2" stroke-linecap="round"/></svg>
      </div>
      <h2>PLAN</h2>
      <p>Planung und Zielsetzung</p>
    </div>
    <div class="quad do">
      <div class="icon-ring">
        <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="7" stroke="#3cb878" stroke-width="2.2"/><path d="M24 10v5M24 33v5M10 24h5M33 24h5M14 14l3.5 3.5M30.5 30.5 34 34M34 14l-3.5 3.5M14 34l3.5-3.5" stroke="#3cb878" stroke-width="2.2" stroke-linecap="round"/></svg>
      </div>
      <h2>DO</h2>
      <p>Umsetzung und Durchführung</p>
    </div>
    <div class="quad check">
      <div class="icon-ring">
        <svg viewBox="0 0 48 48" fill="none"><rect x="8" y="28" width="5" height="11" fill="#f5a623"/><rect x="17" y="21" width="5" height="18" fill="#f5a623"/><rect x="26" y="14" width="5" height="25" fill="#f5a623"/><circle cx="35" cy="35" r="9" stroke="#f5a623" stroke-width="2.2"/><path d="M32 35l2 2 4-4" stroke="#f5a623" stroke-width="2.2" stroke-linecap="round"/></svg>
      </div>
      <h2>CHECK</h2>
      <p>Prüfung und Analyse</p>
    </div>
    <div class="quad act">
      <div class="icon-ring">
        <svg viewBox="0 0 48 48" fill="none"><path d="M8 34 L18 24 L26 28 L40 12" stroke="#e85656" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M34 12h6v6" stroke="#e85656" stroke-width="2.5" stroke-linecap="round"/></svg>
      </div>
      <h2>ACT</h2>
      <p>Verbesserung und Einführung</p>
    </div>
    <div class="center">
      <svg viewBox="0 0 124 124" fill="none">
        <path d="M62 16 A46 46 0 0 1 108 62" stroke="#9ec5e8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#a)"/>
        <path d="M108 62 A46 46 0 0 1 62 108" stroke="#9ec5e8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#a)"/>
        <path d="M62 108 A46 46 0 0 1 16 62" stroke="#9ec5e8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#a)"/>
        <path d="M16 62 A46 46 0 0 1 62 16" stroke="#9ec5e8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#a)"/>
        <defs><marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#9ec5e8"/></marker></defs>
      </svg>
    </div>
  </div>
</body>
</html>
